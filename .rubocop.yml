plugins: rubocop-rspec

AllCops:
  NewCops: enable

# Be consistent on indentations
Layout/LineEndStringConcatenationIndentation:
  EnforcedStyle: indented

# It's ok to have longer lines
Layout/LineLength:
  Exclude:
    # Examples contain stdout copy/pastes that exceed the max limit
    - 'examples/*.rb'
  Max: 160

# Be consistent on indentations
Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

# Be consistent on indentations
Layout/MultilineOperationIndentation:
  EnforcedStyle: indented

# Not all plugins use all keyword arguments, it's normal.
Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: true

# It's ok to have longer methods, while keeping readability.
Metrics/AbcSize:
  Max: 70

# It's ok to have longer methods, while keeping readability.
Metrics/BlockLength:
  Max: 60

# It's ok to have longer methods, while keeping readability.
Metrics/ClassLength:
  Max: 160

# It's ok to have longer methods, while keeping readability.
Metrics/CyclomaticComplexity:
  Max: 20

# It's ok to have longer methods, while keeping readability.
Metrics/MethodLength:
  Max: 90

# It's ok to have longer methods, while keeping readability.
Metrics/ModuleLength:
  Max: 210

# kwargs should not count towards max parameters list.
Metrics/ParameterLists:
  CountKeywordArgs: false

# It's ok to have longer methods, while keeping readability.
Metrics/PerceivedComplexity:
  Max: 30

# These tests are not describing any class or module
RSpec/DescribeClass:
  Exclude:
    - 'spec/scenarios/code_quality_spec.rb'
    - 'spec/scenarios/documentation_spec.rb'
    - 'spec/scenarios/packaging_spec.rb'

# It's ok to have scenarios having multiple lines
RSpec/ExampleLength:
  Max: 170

# It's ok to have test scenarios having several expectations
RSpec/MultipleExpectations:
  Max: 10

# It's ok to have nested groups in RSpec.
RSpec/NestedGroups:
  Max: 5

# Some test files can output to stdout and stderr
RSpec/Output:
  Exclude:
    # This file handles test debug output
    - spec/composable_agents_test/helpers/debug.rb

# TODO: Remove this by using ruby-serial instead of Marshall
Security/MarshalLoad:
  Enabled: false

# I don't want to pollute my code with something that should be integrated in the language
Style/FrozenStringLiteralComment:
  EnforcedStyle: never

# I don't want to pollute my code with something that should be integrated in the language
Style/MutableConstant:
  Enabled: false

# Examples can define multiple classes
Style/OneClassPerFile:
  Exclude:
    - 'examples/*.rb'

# Some objects have a lot of optional nested attributes
Style/SafeNavigationChainLength:
  Max: 3
